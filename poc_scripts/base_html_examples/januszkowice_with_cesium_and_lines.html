	// basic vector drawing script, v3
	// LineOnScreen: draws a line
	// CircleOnScreen: draws a circle of given radius at given location

	class LineOnScreen {
		constructor(coords, lcolor, lwidth, lopacity, groupname) {
			this.coords = coords;
			this.lcolor = lcolor;
			this.lwidth = lwidth;
			this.lopacity = lopacity;
			this.groupname = groupname;
		}

		displayline() {
			const positions = new Float32Array(this.coords);
			const geometry = new THREE.BufferGeometry();
			geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

			const material = new THREE.LineBasicMaterial({
				linewidth: this.lwidth,
				transparent: true,
				color: this.lcolor,
				opacity: this.lopacity
			});

			const line = new THREE.Line(geometry, material);

			const vectorGroup = new THREE.Group();
			vectorGroup.name = this.groupname;
			vectorGroup.add(line);

			this.vectorGroup = vectorGroup;
			potreeViewer.scene.scene.add(vectorGroup);
		}
	}
	console.log("before circle class");

	class CircleOnScreen {
		constructor(center, radius, segments, color, opacity, groupname) {
			this.center = center;       // [x, y, z]
			this.radius = radius;       // circle radius
			this.segments = segments;   // number of vertices (e.g., 64)
			this.color = color;
			this.opacity = opacity;
			this.groupname = groupname;
		}

		displaycircle() {
			const points = [];
			for (let i = 0; i <= this.segments; i++) {
				const theta = (i / this.segments) * Math.PI * 2;
				const x = this.center[0] + this.radius * Math.cos(theta);
				const y = this.center[1] + this.radius * Math.sin(theta);
				const z = this.center[2];
				points.push(new THREE.Vector3(x, y, z));
			}

			const geometry = new THREE.BufferGeometry().setFromPoints(points);
			const material = new THREE.LineBasicMaterial({
				color: this.color,
				transparent: true,
				opacity: this.opacity,
				linewidth: 1
			});

			const circle = new THREE.LineLoop(geometry, material);

			const circleGroup = new THREE.Group();
			circleGroup.name = this.groupname;
			circleGroup.add(circle);

			this.circleGroup = circleGroup;
			potreeViewer.scene.scene.add(circleGroup);
		}
	}

	// --- Loop function for Cesium integration --- 
	function loop(timestamp){
		requestAnimationFrame(loop);

		potreeViewer.update(potreeViewer.clock.getDelta(), timestamp);

		potreeViewer.render();

        

		if(window.toMap !== undefined){

			{
				let camera = potreeViewer.scene.getActiveCamera();

				let pPos = new THREE.Vector3(0, 0, 0).applyMatrix4(camera.matrixWorld);
				let pRight = new THREE.Vector3(600, 0, 0).applyMatrix4(camera.matrixWorld);
				let pUp = new THREE.Vector3(0, 600, 0).applyMatrix4(camera.matrixWorld);
				let pTarget = potreeViewer.scene.view.getPivot();

                let toCes = (pos) => {
                    // Safety check before using proj4
                    if (window.toMap && pos && Number.isFinite(pos.x) && Number.isFinite(pos.y)) {
                        let xy = [pos.x, pos.y];
                        let height = pos.z || 0;
                        try {
                            let deg = window.toMap.forward(xy);
                            return Cesium.Cartesian3.fromDegrees(...deg, height);
                        } catch (err) {
                            console.warn("proj4 forward failed:", err, xy);
                            return new Cesium.Cartesian3();
                        }
                    } else {
                        // fallback Cartesian if something is undefined
                        return new Cesium.Cartesian3();
                    }
                };

				let cPos = toCes(pPos);
				let cUpTarget = toCes(pUp);
				let cTarget = toCes(pTarget);

				let cDir = Cesium.Cartesian3.subtract(cTarget, cPos, new Cesium.Cartesian3());
				let cUp = Cesium.Cartesian3.subtract(cUpTarget, cPos, new Cesium.Cartesian3());

				cDir = Cesium.Cartesian3.normalize(cDir, new Cesium.Cartesian3());
				cUp = Cesium.Cartesian3.normalize(cUp, new Cesium.Cartesian3());

				cesiumViewer.camera.setView({
					destination : cPos,
					orientation : {
						direction : cDir,
						up : cUp
					}
				});

				let aspect = potreeViewer.scene.getActiveCamera().aspect;
				if(aspect < 1){
					let fovy = Math.PI * (potreeViewer.scene.getActiveCamera().fov / 180);
					cesiumViewer.camera.frustum.fov = fovy;
				}else{
					let fovy = Math.PI * (potreeViewer.scene.getActiveCamera().fov / 180);
					let fovx = Math.atan(Math.tan(0.5 * fovy) * aspect) * 2
					cesiumViewer.camera.frustum.fov = fovx;
				}

			}

			cesiumViewer.render();
		}
	}
