<head>
	<meta charset="utf-8">

</head>

<body>
	<script src="./libs/jquery/jquery-3.1.1.min.js"></script>
	<script src="./libs/spectrum/spectrum.js"></script>

	<script src="./libs/openlayers3/ol.js"></script>
	<script src="./libs/i18next/i18next.js"></script>
	<script src="./libs/jstree/jstree.js"></script>
	<script src="./libs/potree/potree.js"></script>
	<script src="./libs/plasio/js/laslaz.js"></script>

	<!-- INCLUDE ADDITIONAL DEPENDENCIES HERE -->
	<!-- INCLUDE SETTINGS HERE -->
	
	<div class="potree_container" style="position: absolute; width: 100%; height: 100%; left: 0px; top: 0px; ">
		
		<div id="potree_render_area" style="background-image: url('../build/potree/resources/images/background.jpg');">
			<div id="cesiumContainer" style="position: absolute; width: 100%; height: 100%; background-color:green"></div>
		</div>
		<div id="potree_sidebar_container"> </div>
	</div>


<script type="module">

	import * as THREE from "./libs/three.js/build/three.module.js";

	window.cesiumViewer = new Cesium.Viewer('cesiumContainer', {
		useDefaultRenderLoop: false,
		animation: false,
		baseLayerPicker : false,
		fullscreenButton: false, 
		geocoder: false,
		homeButton: false,
		infoBox: false,
		sceneModePicker: false,
		selectionIndicator: false,
		timeline: false,
		navigationHelpButton: false,
		imageryProvider : Cesium.createOpenStreetMapImageryProvider({url : 'https://a.tile.openstreetmap.org/'}),
        
        // terrainProvider: new Cesium.CesiumTerrainProvider({
        //     url: 'https://assets.agi.com/stk-terrain/world'
        // }),

		//terrainShadows: Cesium.ShadowMode.DISABLED,
	});

	//let cp = new Cesium.Cartesian3(4303414.154026048, 552161.235598733, 4660771.704035539);wkt_geom	id	info18,764143

    //let cp = new Cesium.Cartesian3(628186.690,134439.309, 151.046);
    // Define your geographic location
    const lon = 18.764143;       // degrees
    const lat = 46.553921;      // degrees
    const height = 150;       // meters

    // Convert to Cartesian3 (ECEF coordinates)
    


    const cp = Cesium.Cartesian3.fromDegrees(lon, lat, height);

    // Optionally move the camera there
    cesiumViewer.camera.setView({
    destination: cp,
    orientation: {
        heading: Cesium.Math.toRadians(0.0),        // camera rotation (degrees → radians)
        pitch: -Cesium.Math.PI_OVER_TWO * 0.5,      // look downward
        roll: 0.0
    }
    });

	window.potreeViewer = new Potree.Viewer(document.getElementById("potree_render_area"), {
		useDefaultRenderLoop: false
	});
	potreeViewer.setEDLEnabled(true);
	potreeViewer.setFOV(60);
	potreeViewer.setPointBudget(1_000_000);
	potreeViewer.setMinNodeSize(0);
	potreeViewer.loadSettingsFromURL();
	potreeViewer.setBackground(null);

	potreeViewer.loadGUI(() => {
		potreeViewer.setLanguage('en');
		$("#menu_appearance").next().show();
		$("#menu_tools").next().show();
		$("#menu_scene").next().show();
		potreeViewer.toggleSidebar();
	});
	
	//Potree.loadPointCloud("http://5.9.65.151/mschuetz/potree/resources/pointclouds/opentopography/CA13_1.4/cloud.js", "CA13", function(e){
    Potree.loadPointCloud("./pointclouds/januszkowice211/metadata.json", "Januszkowice", function(e){


        console.log("pointcloud.projection =", e.pointcloud.projection);
        console.log("metadata offset =", e.pointcloud.offset);

		let pointcloud = e.pointcloud;
		let scene = potreeViewer.scene;
		let material = pointcloud.material;

		scene.addPointCloud(pointcloud);

		material.size = 1;
		material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
		
        potreeViewer.fitToScreen();

        if (e.pointcloud.projection == undefined || e.pointcloud.projection == null || e.pointcloud.projection == ''){
            // Hungary - EOV
            proj4.defs('EPSG:23700',
            '+proj=somerc +lat_0=47.14439372222222 +lon_0=19.04857177777778 ' +
            '+k_0=0.99993 +x_0=650000 +y_0=200000 +ellps=GRS67 ' +
            '+towgs84=52.17,-71.82,-14.9 +units=m +no_defs'
            );
			// Poland - ETRF2000-PL / CS2000/18
			proj4.defs('EPSG:2177', 
			'+proj=tmerc +lat_0=0 +lon_0=18 +k=0.999923 +x_0=6500000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs +type=crs');
			// Poland - ETRF2000-PL / CS2000/21
			proj4.defs('EPSG:2178',
			'+proj=tmerc +lat_0=0 +lon_0=21 +k=0.999923 +x_0=7500000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs +type=crs');

            // tell Potree/proj4 what the source CRS is
            e.pointcloud.projection = 'EPSG:2177';
        }
        
		let pointcloudProjection = e.pointcloud.projection;
		let mapProjection = proj4.defs("WGS84");

		window.toMap = proj4(pointcloudProjection, mapProjection);
		window.toScene = proj4(mapProjection, pointcloudProjection);
		
	});



    // After potreeViewer is initialized:
    potreeViewer.renderer.autoClear = false;
    //potreeViewer.renderer.clearColor.set(0x000000, 0); // transparent background


	function loop(timestamp){
		requestAnimationFrame(loop);

		potreeViewer.update(potreeViewer.clock.getDelta(), timestamp);

		potreeViewer.render();

        

		if(window.toMap !== undefined){

			{
				let camera = potreeViewer.scene.getActiveCamera();

				let pPos = new THREE.Vector3(0, 0, 0).applyMatrix4(camera.matrixWorld);
				let pRight = new THREE.Vector3(600, 0, 0).applyMatrix4(camera.matrixWorld);
				let pUp = new THREE.Vector3(0, 600, 0).applyMatrix4(camera.matrixWorld);
				let pTarget = potreeViewer.scene.view.getPivot();

                let toCes = (pos) => {
                    // Safety check before using proj4
                    if (window.toMap && pos && Number.isFinite(pos.x) && Number.isFinite(pos.y)) {
                        let xy = [pos.x, pos.y];
                        let height = pos.z || 0;
                        try {
                            let deg = window.toMap.forward(xy);
                            return Cesium.Cartesian3.fromDegrees(...deg, height);
                        } catch (err) {
                            console.warn("proj4 forward failed:", err, xy);
                            return new Cesium.Cartesian3();
                        }
                    } else {
                        // fallback Cartesian if something is undefined
                        return new Cesium.Cartesian3();
                    }
                };

				let cPos = toCes(pPos);
				let cUpTarget = toCes(pUp);
				let cTarget = toCes(pTarget);

				let cDir = Cesium.Cartesian3.subtract(cTarget, cPos, new Cesium.Cartesian3());
				let cUp = Cesium.Cartesian3.subtract(cUpTarget, cPos, new Cesium.Cartesian3());

				cDir = Cesium.Cartesian3.normalize(cDir, new Cesium.Cartesian3());
				cUp = Cesium.Cartesian3.normalize(cUp, new Cesium.Cartesian3());

				cesiumViewer.camera.setView({
					destination : cPos,
					orientation : {
						direction : cDir,
						up : cUp
					}
				});

				let aspect = potreeViewer.scene.getActiveCamera().aspect;
				if(aspect < 1){
					let fovy = Math.PI * (potreeViewer.scene.getActiveCamera().fov / 180);
					cesiumViewer.camera.frustum.fov = fovy;
				}else{
					let fovy = Math.PI * (potreeViewer.scene.getActiveCamera().fov / 180);
					let fovx = Math.atan(Math.tan(0.5 * fovy) * aspect) * 2
					cesiumViewer.camera.frustum.fov = fovx;
				}

			}

			cesiumViewer.render();
		}
	}

	requestAnimationFrame(loop);


  </script>
</body>
</html>
